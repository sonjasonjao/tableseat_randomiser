<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Who sits where? 🪑</title>
		<link rel="stylesheet" href="./seats.css" />
		<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&display=swap" rel="stylesheet" />
	</head>
	<body>
		<div class="banner">
			<h1 class="title">Who sits where? 🪑</h1>
			<h3 class="subtitle">Table seat randomiser</h3>
		</div>
		<div class="content">
			<div class="nro-input">
				<label for="people-amt" class="input-label">Number of people: </label>
				<input id="people-amt" type="number"/>
			</div>
			<form class="name-mode-input">
				<input type="radio" id="manual" name="name-mode" value="manual">
				<label for="manual" class="name-mode-choice">Give names</label>
				<input type="radio" id="default" name="name-mode" value="default">
				<label for="default" class="name-mode-choice">Use running numbers</label>
			</form>
			<form class="name-input">
				<div class="names">
				</div>
			</form>
			<div class="shape-input">
				<label for="shape-choice" class="input-label">Type of table: </label>
				<select id="shape-choice">
					<option value="square">Round or rectangle with seats at each end</option>
					<option value="rectangle">Rectangle without seats at ends</option>
				</select>
			</div>
			<div>
				<button id="run">Randomise!</button>
			</div>
			<div id="result-table">
				<div class="grid-item">
					<div class="scroll-container">
					</div>
				</div>
			</div>
		</div>
		<script src="./seats.js"></script>
	</body>
